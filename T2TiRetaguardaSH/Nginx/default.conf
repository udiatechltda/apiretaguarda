# Redireciona HTTP para HTTPS (exceto para validação Let's Encrypt)

server {

    listen 80;

    server_name retaguardash.techone-it.com.br;

    client_max_body_size 100M;
    

    # Permite validação do Let's Encrypt

    location /.well-known/acme-challenge/ {

        root /var/www/certbot;

    }

    

    # Redireciona todo o resto para HTTPS

    location / {

        return 301 https://$server_name$request_uri;

    }

}



# Servidor HTTPS

server {

    listen 443 ssl http2;

    server_name retaguardash.techone-it.com.br;

	client_max_body_size 100M;


    ssl_certificate /etc/letsencrypt/live/retaguardash.techone-it.com.br/fullchain.pem;

    ssl_certificate_key /etc/letsencrypt/live/retaguardash.techone-it.com.br/privkey.pem;



    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_prefer_server_ciphers on;

    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;



    location /downloads/ {
        alias /var/www/downloads/;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
    }

    location / {

        proxy_pass http://app_dotnet:8000;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection keep-alive;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;


     add_header 'Access-Control-Allow-Origin' '*';
     add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

    # Lida com requisições OPTIONS (preflight)
    if ($request_method = 'OPTIONS') {
        return 204;
    }

  }

}
